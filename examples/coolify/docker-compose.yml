services:
  web:
    image: jitsi/web:${JITSI_IMAGE_VERSION:-stable}
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - jitsi-web-config:/config
      - ./custom-config.js:/config/custom-config.js:ro
      - jitsi-web-crontabs:/var/spool/cron/crontabs
      - jitsi-transcripts:/usr/share/jitsi-meet/transcripts
    environment:
      - ENABLE_COLIBRI_WEBSOCKET=1
      - ENABLE_XMPP_WEBSOCKET=${ENABLE_XMPP_WEBSOCKET:-0}
      - PREFER_BOSH=${PREFER_BOSH:-1}
      - PUBLIC_URL=${PUBLIC_URL}
      - TZ=${TZ:-Europe/Berlin}
      - DISABLE_HTTPS=${DISABLE_HTTPS:-1}
      - ENABLE_HTTP_REDIRECT=${ENABLE_HTTP_REDIRECT:-0}
      # Ensure nginx proxies BOSH/XMPP-WS to the same internal XMPP host used by other services
      - XMPP_BOSH_URL_BASE=http://${XMPP_SERVER:-prosody}:5280
      - XMPP_WEBSOCKET_PROXY_READ_TIMEOUT=${XMPP_WEBSOCKET_PROXY_READ_TIMEOUT:-3600s}
      - XMPP_WEBSOCKET_PROXY_SEND_TIMEOUT=${XMPP_WEBSOCKET_PROXY_SEND_TIMEOUT:-3600s}
      - COLIBRI_WEBSOCKET_PROXY_READ_TIMEOUT=${COLIBRI_WEBSOCKET_PROXY_READ_TIMEOUT:-3600s}
      - COLIBRI_WEBSOCKET_PROXY_SEND_TIMEOUT=${COLIBRI_WEBSOCKET_PROXY_SEND_TIMEOUT:-3600s}
      # Must match JVB_WS_SERVER_ID in the jvb service
      - COLIBRI_WEBSOCKET_REGEX=jvb
      - DISABLE_COLIBRI_WEBSOCKET_JVB_LOOKUP=1
    depends_on:
      - jvb
    networks:
      meet.jitsi:

  turn:
    image: coturn/coturn:latest
    restart: unless-stopped
    ports:
      - "${TURN_PORT:-3478}:${TURN_PORT:-3478}/udp"
      - "${TURN_PORT:-3478}:${TURN_PORT:-3478}/tcp"
      - "${TURN_MIN_PORT:-20000}-${TURN_MAX_PORT:-20050}:${TURN_MIN_PORT:-20000}-${TURN_MAX_PORT:-20050}/udp"
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        cat > /tmp/turnserver.conf <<EOF
        log-file=stdout
        fingerprint
        use-auth-secret
        static-auth-secret=${TURN_CREDENTIALS:?TURN_CREDENTIALS is required}
        realm=${TURN_HOST:?TURN_HOST is required}
        external-ip=${TURN_EXTERNAL_IP:?TURN_EXTERNAL_IP is required}
        listening-ip=0.0.0.0
        listening-port=${TURN_PORT:-3478}
        min-port=${TURN_MIN_PORT:-20000}
        max-port=${TURN_MAX_PORT:-20050}
        no-cli
        no-tls
        no-dtls
        no-multicast-peers
        stale-nonce=600
        EOF
        exec turnserver -c /tmp/turnserver.conf
    networks:
      meet.jitsi:

  prosody:
    image: jitsi/prosody:${JITSI_IMAGE_VERSION:-stable}
    restart: unless-stopped
    expose:
      - "5222"
      - "5347"
      - "5280"
    volumes:
      - jitsi-prosody-config:/config
      - jitsi-prosody-plugins:/prosody-plugins-custom
    environment:
      - PUBLIC_URL=${PUBLIC_URL}
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
      - LOG_LEVEL=${PROSODY_LOG_LEVEL:-debug}
      - PROSODY_SMACKS_HIBERNATION_TIME=${PROSODY_SMACKS_HIBERNATION_TIME:-300}
      - STUN_HOST=${STUN_HOST:-}
      - STUN_PORT=${STUN_PORT:-3478}
      - TURN_CREDENTIALS=${TURN_CREDENTIALS:-}
      - TURN_USERNAME=${TURN_USERNAME:-}
      - TURN_PASSWORD=${TURN_PASSWORD:-}
      - TURN_HOST=${TURN_HOST:-}
      - TURNS_HOST=${TURNS_HOST:-}
      - TURN_PORT=${TURN_PORT:-3478}
      - TURNS_PORT=${TURNS_PORT:-5349}
      - TURN_TRANSPORT=${TURN_TRANSPORT:-udp,tcp}
      - TURN_TTL=${TURN_TTL:-86400}
      - TZ=${TZ:-Europe/Berlin}
      - XMPP_SERVER=${XMPP_SERVER:-prosody}
      - XMPP_DOMAIN=${XMPP_DOMAIN:-meet.jitsi}
      - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN:-auth.meet.jitsi}
      - XMPP_MUC_DOMAIN=${XMPP_MUC_DOMAIN:-muc.meet.jitsi}
      - XMPP_INTERNAL_MUC_DOMAIN=${XMPP_INTERNAL_MUC_DOMAIN:-internal-muc.meet.jitsi}
    networks:
      meet.jitsi:
        aliases:
          - ${XMPP_SERVER:-prosody}

  jicofo:
    image: jitsi/jicofo:${JITSI_IMAGE_VERSION:-stable}
    restart: unless-stopped
    volumes:
      - jitsi-jicofo-config:/config
    environment:
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
      - JICOFO_LOG_LEVEL=${JICOFO_LOG_LEVEL:-FINE}
      - JICOFO_LOG_FILE=${JICOFO_LOG_FILE:-/config/jicofo.log}
      - JICOFO_EXTRA_LOGGERS=${JICOFO_EXTRA_LOGGERS:-}
      - XMPP_SERVER=${XMPP_SERVER:-prosody}
      - TZ=${TZ:-Europe/Berlin}
      - XMPP_DOMAIN=${XMPP_DOMAIN:-meet.jitsi}
      - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN:-auth.meet.jitsi}
      - XMPP_MUC_DOMAIN=${XMPP_MUC_DOMAIN:-muc.meet.jitsi}
      - XMPP_INTERNAL_MUC_DOMAIN=${XMPP_INTERNAL_MUC_DOMAIN:-internal-muc.meet.jitsi}
    depends_on:
      - prosody
    networks:
      meet.jitsi:

  jvb:
    image: jitsi/jvb:${JITSI_IMAGE_VERSION:-stable}
    restart: unless-stopped
    ports:
      - "${JVB_PORT:-10000}:${JVB_PORT:-10000}/udp"
    volumes:
      - jitsi-jvb-config:/config
    environment:
      - PUBLIC_URL=${PUBLIC_URL}
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
      - JVB_LOG_LEVEL=${JVB_LOG_LEVEL:-FINE}
      - JVB_LOG_FILE=${JVB_LOG_FILE:-/config/jvb.log}
      - JVB_EXTRA_LOGGERS=${JVB_EXTRA_LOGGERS:-}
      # REQUIRED: public IP of the host - wrong value is the #1 cause of ICE failures
      - JVB_ADVERTISE_IPS=${JVB_ADVERTISE_IPS}
      # Disable private Docker-internal IPs as ICE candidates (they are unreachable from outside)
      - JVB_ADVERTISE_PRIVATE_CANDIDATES=false
      - JVB_PORT=${JVB_PORT:-10000}
      - JVB_STUN_SERVERS=${JVB_STUN_SERVERS:-meet-jit-si-turnrelay.jitsi.net:443}
      # Pin the Colibri WS server-id to a stable name so nginx regex matches reliably
      - JVB_WS_SERVER_ID=jvb
      - XMPP_SERVER=${XMPP_SERVER:-prosody}
      - TZ=${TZ:-Europe/Berlin}
      - XMPP_DOMAIN=${XMPP_DOMAIN:-meet.jitsi}
      - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN:-auth.meet.jitsi}
      - XMPP_INTERNAL_MUC_DOMAIN=${XMPP_INTERNAL_MUC_DOMAIN:-internal-muc.meet.jitsi}
    depends_on:
      - prosody
    networks:
      meet.jitsi:

volumes:
  jitsi-web-config:
  jitsi-web-crontabs:
  jitsi-transcripts:
  jitsi-prosody-config:
  jitsi-prosody-plugins:
  jitsi-jicofo-config:
  jitsi-jvb-config:

networks:
  meet.jitsi:
